services:
  - type: web
    name: theta-tutorial-center
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn theta_backend.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: theta_backend.settings
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0