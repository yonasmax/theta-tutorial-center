<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theta Tutorial Center - Lab & Library Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .stat-card .label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .equipment-item, .book-item, .simulation-item, .borrowing-item {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .equipment-name, .book-title, .simulation-title, .borrowing-student {
            font-weight: 600;
            color: #333;
        }

        .equipment-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            background: #d4edda;
            color: #155724;
        }

        .simulation-link {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 12px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.85em;
        }

        .simulation-link:hover {
            background: #5a67d8;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background: #5a67d8;
        }

        .text-muted {
            color: #888;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔬 Lab & Library Dashboard</h1>
            <p>Theta Tutorial Center - Equipment, Books & Virtual Learning</p>
        </div>

        <button class="refresh-btn" onclick="location.reload()">🔄 Refresh Data</button>

        <div class="stats-grid" id="statsCards">
            <div class="stat-card">
                <div class="value" id="totalEquipment">-</div>
                <div class="label">Total Equipment</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalBooks">-</div>
                <div class="label">Total Books</div>
            </div>
            <div class="stat-card">
                <div class="value" id="availableBooks">-</div>
                <div class="label">Available Books</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalSimulations">-</div>
                <div class="label">Virtual Simulations</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>🔧 Available Equipment</h3>
                <div id="equipmentList">Loading...</div>
            </div>

            <div class="card">
                <h3>📚 Books in Library</h3>
                <div id="booksList">Loading...</div>
            </div>

            <div class="card">
                <h3>💻 Virtual Simulations</h3>
                <div id="simulationsList">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadAllData() {
            await loadStats();
            await loadEquipment();
            await loadBooks();
            await loadSimulations();
        }

        async function loadStats() {
            try {
                const equipmentRes = await fetch('/api/lab-library/equipment/');
                const equipmentData = await equipmentRes.json();
                document.getElementById('totalEquipment').textContent = equipmentData.count || 0;

                const booksRes = await fetch('/api/lab-library/books/');
                const booksData = await booksRes.json();
                document.getElementById('totalBooks').textContent = booksData.count || 0;

                const availableRes = await fetch('/api/lab-library/available-books/');
                const availableData = await availableRes.json();
                document.getElementById('availableBooks').textContent = availableData.count || 0;

                const simsRes = await fetch('/api/lab-library/simulations/');
                const simsData = await simsRes.json();
                document.getElementById('totalSimulations').textContent = simsData.count || 0;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadEquipment() {
            try {
                const response = await fetch('/api/lab-library/equipment/');
                const data = await response.json();
                
                if (!data.results || data.results.length === 0) {
                    document.getElementById('equipmentList').innerHTML = '<p class="text-muted">No equipment found</p>';
                    return;
                }
                
                let html = '';
                data.results.slice(0, 5).forEach(item => {
                    html += `
                        <div class="equipment-item">
                            <div class="equipment-name">${escapeHtml(item.name)}</div>
                            <div class="text-muted">${item.category} | Available: ${item.available_quantity}/${item.quantity}</div>
                            <span class="equipment-status">${item.status}</span>
                        </div>
                    `;
                });
                document.getElementById('equipmentList').innerHTML = html;
            } catch (error) {
                document.getElementById('equipmentList').innerHTML = '<p class="text-muted">Error loading equipment</p>';
            }
        }

        async function loadBooks() {
            try {
                const response = await fetch('/api/lab-library/books/');
                const data = await response.json();
                
                if (!data.results || data.results.length === 0) {
                    document.getElementById('booksList').innerHTML = '<p class="text-muted">No books found</p>';
                    return;
                }
                
                let html = '';
                data.results.slice(0, 5).forEach(book => {
                    html += `
                        <div class="book-item">
                            <div class="book-title">${escapeHtml(book.title)}</div>
                            <div class="text-muted">by ${escapeHtml(book.author)}</div>
                            <div class="text-muted">Available: ${book.available_copies}/${book.total_copies} copies</div>
                        </div>
                    `;
                });
                document.getElementById('booksList').innerHTML = html;
            } catch (error) {
                document.getElementById('booksList').innerHTML = '<p class="text-muted">Error loading books</p>';
            }
        }

        async function loadSimulations() {
            try {
                const response = await fetch('/api/lab-library/simulations/');
                const data = await response.json();
                
                if (!data.results || data.results.length === 0) {
                    document.getElementById('simulationsList').innerHTML = '<p class="text-muted">No simulations found</p>';
                    return;
                }
                
                let html = '';
                data.results.slice(0, 5).forEach(sim => {
                    html += `
                        <div class="simulation-item">
                            <div class="simulation-title">${escapeHtml(sim.title)}</div>
                            <div class="text-muted">${escapeHtml(sim.subject)}</div>
                            <div class="text-muted">${escapeHtml(sim.description.substring(0, 60))}...</div>
                            <a href="${escapeHtml(sim.url)}" target="_blank" class="simulation-link">Launch →</a>
                        </div>
                    `;
                });
                document.getElementById('simulationsList').innerHTML = html;
            } catch (error) {
                document.getElementById('simulationsList').innerHTML = '<p class="text-muted">Error loading simulations</p>';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadAllData();
        setInterval(loadAllData, 30000);
    </script>
</body>
</html>
