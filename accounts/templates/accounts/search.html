<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Theta Tutorial Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #48bb78;
            --warning: #ed8936;
            --danger: #fc8181;
            --dark: #1a202c;
            --gray: #718096;
            --light-gray: #f7fafc;
            --white: #ffffff;
            --shadow: 0 10px 40px rgba(0,0,0,0.08);
            --shadow-hover: 0 20px 60px rgba(0,0,0,0.12);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f4f8;
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ========== HEADER ========== */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left .logo { font-size: 28px; }
        .header-left h1 { font-size: 22px; font-weight: 700; }
        .header-left h1 span { font-weight: 300; opacity: 0.8; }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 14px;
            transition: var(--transition);
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .nav-links .student-btn {
            background: rgba(255,255,255,0.25);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ========== CONTAINER ========== */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* ========== SEARCH BOX ========== */
        .search-section {
            background: var(--white);
            border-radius: var(--radius);
            padding: 35px 40px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            border: 1px solid rgba(102, 126, 234, 0.06);
        }

        .search-section h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .search-section p {
            color: var(--gray);
            margin-bottom: 20px;
        }

        .search-wrapper {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-input-wrapper {
            flex: 1;
            min-width: 250px;
            display: flex;
            align-items: center;
            background: var(--light-gray);
            border-radius: 50px;
            padding: 0 20px;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .search-input-wrapper:focus-within {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .search-input-wrapper i {
            color: var(--gray);
            font-size: 16px;
        }

        .search-input-wrapper input {
            border: none;
            background: transparent;
            padding: 14px 16px;
            font-size: 15px;
            font-family: inherit;
            width: 100%;
            outline: none;
            color: var(--dark);
        }

        .search-input-wrapper input::placeholder {
            color: #a0aec0;
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* ========== FILTERS ========== */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
        }

        .filters select {
            padding: 10px 18px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            background: var(--white);
            font-family: inherit;
            font-size: 14px;
            color: var(--dark);
            cursor: pointer;
            transition: var(--transition);
            min-width: 150px;
        }

        .filters select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .filters select:hover {
            border-color: var(--primary);
        }

        .reset-btn {
            background: #e2e8f0;
            color: var(--dark);
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reset-btn:hover {
            background: #cbd5e0;
            transform: translateY(-2px);
        }

        /* ========== RESULTS ========== */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .results-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
        }

        .results-header .count {
            background: var(--light-gray);
            padding: 4px 16px;
            border-radius: 50px;
            font-size: 14px;
            color: var(--gray);
        }

        /* ========== LESSON CARDS ========== */
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .lesson-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 24px 26px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(102, 126, 234, 0.06);
            transition: var(--transition);
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .lesson-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .lesson-card .type-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .type-badge.video { background: #fef3c7; color: #92400e; }
        .type-badge.quiz { background: #dbeafe; color: #1e40af; }
        .type-badge.article { background: #d1fae5; color: #065f46; }

        .lesson-card h4 {
            font-size: 17px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .lesson-card .topic {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 8px;
        }

        .lesson-card .description {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .lesson-card .meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--gray);
        }

        .lesson-card .meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lesson-card .video-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 6px 16px;
            background: #dc2626;
            color: var(--white);
            text-decoration: none;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition);
        }

        .lesson-card .video-link:hover {
            background: #b91c1c;
            transform: scale(1.02);
        }

        /* ========== LOADING ========== */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }

        .loading i {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
            color: var(--primary);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
                flex-direction: column;
                text-align: center;
            }
            .header-left h1 { font-size: 18px; }
            .nav-links { justify-content: center; }
            .nav-links a { font-size: 13px; padding: 6px 14px; }
            .search-section { padding: 20px; }
            .search-wrapper { flex-direction: column; }
            .search-input-wrapper { border-radius: 12px; }
            .search-btn { justify-content: center; border-radius: 12px; }
            .filters { flex-direction: column; }
            .filters select { width: 100%; }
            .lessons-grid { grid-template-columns: 1fr; }
            .results-header { flex-direction: column; align-items: flex-start; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lesson-card:nth-child(1) { animation-delay: 0.05s; }
        .lesson-card:nth-child(2) { animation-delay: 0.1s; }
        .lesson-card:nth-child(3) { animation-delay: 0.15s; }
        .lesson-card:nth-child(4) { animation-delay: 0.2s; }
        .lesson-card:nth-child(5) { animation-delay: 0.25s; }
        .lesson-card:nth-child(6) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <span class="logo">📚</span>
            <h1>Theta <span>Tutorial Center</span></h1>
        </div>
        <div class="nav-links">
            <a href="/student-login/" class="student-btn"><i class="fas fa-user-graduate"></i> Student Login</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">
        <!-- Search Section -->
        <div class="search-section">
            <h2><i class="fas fa-search" style="color: var(--primary);"></i> Search Lessons</h2>
            <p>Find learning materials by title, topic, or description</p>

            <div class="search-wrapper">
                <div class="search-input-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by title, topic, or description...">
                </div>
                <button class="search-btn" id="searchBtn"><i class="fas fa-arrow-right"></i> Search</button>
            </div>

            <div class="filters">
                <select id="gradeFilter">
                    <option value="">All Grades</option>
                    <option value="Grade 9">Grade 9</option>
                    <option value="Grade 10">Grade 10</option>
                    <option value="Grade 11">Grade 11</option>
                    <option value="Grade 12">Grade 12</option>
                </select>
                <select id="subjectFilter">
                    <option value="">All Subjects</option>
                </select>
                <select id="typeFilter">
                    <option value="">All Content Types</option>
                    <option value="video">📹 Video</option>
                    <option value="quiz">📝 Quiz</option>
                    <option value="article">📄 Article</option>
                </select>
                <button class="reset-btn" id="resetBtn"><i class="fas fa-undo"></i> Reset</button>
            </div>
        </div>

        <!-- Results -->
        <div class="results-header">
            <h3><i class="fas fa-list" style="color: var(--primary);"></i> Results</h3>
            <span class="count" id="resultCount">Loading...</span>
        </div>

        <div class="lessons-grid" id="resultsContainer">
            <div class="loading">
                <i class="fas fa-spinner fa-pulse"></i>
                Loading lessons...
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;

        // Load filter options
        async function loadFilterOptions() {
            try {
                const response = await fetch('/api/filter-options/');
                const data = await response.json();

                const subjectSelect = document.getElementById('subjectFilter');
                data.subjects.forEach(subject => {
                    const option = document.createElement('option');
                    option.value = subject;
                    option.textContent = subject;
                    subjectSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading filters:', error);
            }
        }

        // Search lessons
        async function searchLessons(page = 1) {
            const searchInput = document.getElementById('searchInput').value;
            const grade = document.getElementById('gradeFilter').value;
            const subject = document.getElementById('subjectFilter').value;
            const contentType = document.getElementById('typeFilter').value;

            let url = `/api/search/?page=${page}`;
            if (searchInput) url += `&search=${encodeURIComponent(searchInput)}`;
            if (grade) url += `&grade=${encodeURIComponent(grade)}`;
            if (subject) url += `&subject=${encodeURIComponent(subject)}`;
            if (contentType) url += `&content_type=${contentType}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                document.getElementById('resultCount').textContent = `Found ${data.count} results`;

                const container = document.getElementById('resultsContainer');

                if (!data.results || data.results.length === 0) {
                    container.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--gray);">
                            <i class="fas fa-search" style="font-size: 40px; display: block; margin-bottom: 12px;"></i>
                            <p>No results found. Try adjusting your search.</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                data.results.forEach(lesson => {
                    const typeClass = lesson.content_type || 'article';
                    html += `
                        <div class="lesson-card">
                            <span class="type-badge ${typeClass}">${typeClass}</span>
                            <h4>${escapeHtml(lesson.title)}</h4>
                            <div class="topic"><i class="fas fa-tag"></i> ${escapeHtml(lesson.topic)}</div>
                            <div class="description">${escapeHtml(lesson.description || 'No description available')}</div>
                            <div class="meta">
                                <span><i class="fas fa-graduation-cap"></i> ${escapeHtml(lesson.grade_level || 'N/A')}</span>
                                <span><i class="fas fa-book"></i> ${escapeHtml(lesson.subject_name || 'N/A')}</span>
                            </div>
                            ${lesson.video_url ? `<a href="${escapeHtml(lesson.video_url)}" target="_blank" class="video-link"><i class="fas fa-play"></i> Watch Video</a>` : ''}
                        </div>
                    `;
                });

                container.innerHTML = html;
            } catch (error) {
                document.getElementById('resultsContainer').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--danger);">
                        <i class="fas fa-exclamation-circle" style="font-size: 40px; display: block; margin-bottom: 12px;"></i>
                        <p>Error loading results. Please try again.</p>
                    </div>
                `;
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        document.getElementById('searchBtn').addEventListener('click', () => searchLessons(1));
        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('gradeFilter').value = '';
            document.getElementById('subjectFilter').value = '';
            document.getElementById('typeFilter').value = '';
            searchLessons(1);
        });

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchLessons(1);
        });

        document.getElementById('gradeFilter').addEventListener('change', () => searchLessons(1));
        document.getElementById('subjectFilter').addEventListener('change', () => searchLessons(1));
        document.getElementById('typeFilter').addEventListener('change', () => searchLessons(1));

        // Initial load
        loadFilterOptions();
        searchLessons(1);
    </script>
</body>
</html>
