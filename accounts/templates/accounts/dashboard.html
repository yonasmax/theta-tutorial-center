<!DOCTYPE html>
<html>
<head>
    <title>Theta Tutorial Center</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }
        h1 { color: #667eea; }
        .card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Theta Tutorial Center</h1>
        <p>Welcome to the Admin Dashboard</p>
        
        <div class="card">
            <h2>Dashboard Overview</h2>
            <div id="stats">
                <button onclick="loadStudents()">Load Students</button>
                <button onclick="loadProgress()">Load Progress</button>
            </div>
        </div>
        
        <div class="card">
            <h3>Students List</h3>
            <div id="studentsList">Click "Load Students" to view</div>
        </div>
        
        <div class="card">
            <h3>Progress Data</h3>
            <div id="progressList">Click "Load Progress" to view</div>
        </div>
    </div>

    <script>
        async function loadStudents() {
            const response = await fetch('/api/students/');
            const data = await response.json();
            let html = '<table><th>Name</th><th>Grade</th><th>Payment Status</th>\\n';
            if (data.results) {
                data.results.forEach(s => {
                    html += `<tr><td>${s.name}</td><td>Grade ${s.grade}</td><td>${s.payment_status}</td></tr>`;
                });
            }
            html += '</table>';
            document.getElementById('studentsList').innerHTML = html;
        }
        
        async function loadProgress() {
            const response = await fetch('/api/progress/');
            const data = await response.json();
            let html = '</table><th>Student</th><th>Lesson</th><th>Progress</th>\\n';
            if (data.results) {
                data.results.slice(0, 10).forEach(p => {
                    html += `<tr><td>${p.student_name}</td><td>${p.lesson_title}</td><td>${p.progress_percentage}%</td></tr>`;
                });
            }
            html += '</table>';
            document.getElementById('progressList').innerHTML = html;
        }
        
        // Load automatically on page load
        loadStudents();
        loadProgress();
    </script>
</body>
</html>
